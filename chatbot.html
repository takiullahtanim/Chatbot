<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --border: #3a3a3a;
  --accent: #cc7a00;
  --text: #ececec;
  --text2: #888;
  --radius: 12px;
  --max-w: 720px;
}

body {
  font-family: 'Inter', 'Hind Siliguri', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
}

header h1 {
  font-size: 15px;
  font-weight: 500;
}

#chat-box {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 32px 24px;
  gap: 0;
}

.welcome {
  margin: auto;
  text-align: center;
  max-width: 480px;
}

.welcome h2 {
  font-size: 26px;
  font-weight: 500;
  margin-bottom: 10px;
}

.welcome p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
}

.message {
  display: flex;
  gap: 16px;
  padding: 20px 0;
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
  border-top: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}

.message:first-child { border-top: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user { flex-direction: row-reverse; }

.msg-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
}

.message.bot .msg-icon { background: var(--accent); color: #fff; font-weight: 600; }
.message.user .msg-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }

.msg-content { flex: 1; max-width: calc(100% - 46px); }

.msg-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  word-break: break-word;
}

.message.user .msg-text {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: inline-block;
}

.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 8px 0;
}

.typing span {
  width: 6px;
  height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: dot 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot {
  0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.3); }
}

/* Bottom */
.bottom {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 14px 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.input-wrap {
  width: 100%;
  max-width: var(--max-w);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: border-color 0.2s;
}

.input-wrap:focus-within { border-color: #555; }

/* API key row — subtle strip inside box */
#key-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}

#key-row label {
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
}

#api-key-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 12px;
  color: var(--text2);
  font-family: monospace;
  padding: 2px 0;
}

#api-key-input::placeholder { color: #555; }

#save-key-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}

#save-key-btn:hover { border-color: #666; color: var(--text); }

#key-saved {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: #555;
}

#key-saved span.change {
  cursor: pointer;
  text-decoration: underline;
  color: #555;
}

#key-saved span.change:hover { color: var(--text2); }

/* Message row */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 14px;
}

#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: 'Inter', 'Hind Siliguri', sans-serif;
  resize: none;
  max-height: 150px;
  line-height: 1.6;
  padding: 2px 0;
}

#user-input::placeholder { color: var(--text2); }

#send-btn {
  width: 34px;
  height: 34px;
  background: var(--text2);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}

#send-btn:hover { background: var(--text); }
#send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
#send-btn svg { width: 16px; height: 16px; fill: var(--bg); }

.hint { font-size: 11px; color: #555; }
</style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <h1>AI Assistant</h1>
</header>

<div id="chat-box">
  <div class="welcome">
    <h2>আমি কীভাবে সাহায্য করতে পারি?</h2>
    <p>যেকোনো প্রশ্ন করো — বাংলায় বা ইংরেজিতে।</p>
  </div>
</div>

<div class="bottom">
  <div class="input-wrap">

    <div id="key-row">
      <label>API Key</label>
      <input type="password" id="api-key-input" placeholder="Gemini API key দাও...">
      <button id="save-key-btn" onclick="saveKey()">Save</button>
    </div>

    <div id="key-saved">
      ✓ API key saved &nbsp;
      <span class="change" onclick="resetKey()">Change</span>
    </div>

    <div class="msg-row">
      <textarea id="user-input" rows="1"
        placeholder="একটা বার্তা লিখুন..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="hint">Enter — পাঠাও &nbsp;·&nbsp; Shift+Enter — নতুন লাইন</div>
</div>

<script>
let apiKey = localStorage.getItem('gemini_key') || '';
let loading = false;
let history = [];

function init() {
  if (apiKey) {
    document.getElementById('key-row').style.display = 'none';
    document.getElementById('key-saved').style.display = 'flex';
    document.getElementById('send-btn').disabled = false;
  }
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('gemini_key', val);
  document.getElementById('key-row').style.display = 'none';
  document.getElementById('key-saved').style.display = 'flex';
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

function resetKey() {
  apiKey = '';
  localStorage.removeItem('gemini_key');
  document.getElementById('api-key-input').value = '';
  document.getElementById('key-row').style.display = 'flex';
  document.getElementById('key-saved').style.display = 'none';
  document.getElementById('send-btn').disabled = true;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addMsg(text, role) {
  const box = document.getElementById('chat-box');
  const welcome = box.querySelector('.welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'bot' ? '✦' : '👤';

  const content = document.createElement('div');
  content.className = 'msg-content';
  const txt = document.createElement('div');
  txt.className = 'msg-text';
  txt.innerHTML = text.replace(/\n/g, '<br>');
  content.appendChild(txt);

  wrap.appendChild(icon);
  wrap.appendChild(content);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.className = 'message bot';
  wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="msg-icon">✦</div>
    <div class="msg-content">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  if (loading || !apiKey) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  loading = true;
  document.getElementById('send-btn').disabled = true;

  addMsg(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: history,
          systemInstruction: {
            parts: [{ text: 'তুমি একটি helpful AI assistant। বাংলায় প্রশ্ন করলে বাংলায় উত্তর দাও, ইংরেজিতে করলে ইংরেজিতে। উত্তর সংক্ষিপ্ত ও স্পষ্ট রাখো।' }]
          },
          generationConfig: { temperature: 0.9, maxOutputTokens: 1000 }
        })
      }
    );

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'উত্তর পাওয়া যায়নি।';
    history.push({ role: 'model', parts: [{ text: reply }] });
    removeTyping();
    addMsg(reply, 'bot');

  } catch (err) {
    removeTyping();
    addMsg('❌ ' + err.message, 'bot');
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

init();
</script>
</body>
</html>
